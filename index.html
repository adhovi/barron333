<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barron's 333 Vocabulary Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== THEME TOKENS ===== */
        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #f7f9fc;
            --border: #dde3ed;
            --accent: #3b6fd4;
            --accent2: #7c5cbf;
            --green: #1a9e6e;
            --text: #1a202c;
            --text-muted: #5a6a82;
            --word-color: #1e4fa8;
            --mnemonic-color: #1a7a50;
            --hover-row: #eef3fb;
            --selected-row: #dbeafe;
            --badge-bg: rgba(26,158,110,0.1);
            --badge-border: rgba(26,158,110,0.3);
            --badge-text: #1a9e6e;
            --header-th: #3b5280;
            --header-th-bg: #e8edf8;
            --shadow: 0 2px 16px rgba(60,80,140,0.08);
            --btn-bg: #fff;
            --btn-color: #3b6fd4;
            --btn-border: #3b6fd4;
            --btn-active-bg: #3b6fd4;
            --btn-active-color: #fff;
            --search-bg: #fff;
            --search-border: #dde3ed;
            --toggle-bg: #e2e8f0;
            --toggle-knob: #fff;
            --revlist-bg: #fff3cd;
            --revlist-border: #ffc107;
        }
        [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #6c8ef5;
            --accent2: #a78bfa;
            --green: #34d399;
            --text: #e2e8f0;
            --text-muted: #8892b0;
            --word-color: #93c5fd;
            --mnemonic-color: #86efac;
            --hover-row: rgba(108,142,245,0.07);
            --selected-row: rgba(108,142,245,0.18);
            --badge-bg: rgba(52,211,153,0.12);
            --badge-border: rgba(52,211,153,0.25);
            --badge-text: #34d399;
            --header-th: #c8d6f0;
            --header-th-bg: #22263a;
            --shadow: 0 2px 16px rgba(0,0,0,0.35);
            --btn-bg: #1a1d27;
            --btn-color: #6c8ef5;
            --btn-border: #2e3350;
            --btn-active-bg: #6c8ef5;
            --btn-active-color: #fff;
            --search-bg: #22263a;
            --search-border: #2e3350;
            --toggle-bg: #2e3350;
            --toggle-knob: #6c8ef5;
            --revlist-bg: rgba(255,193,7,0.08);
            --revlist-border: #b8860b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px 14px 40px;
            transition: background 0.25s, color 0.25s;
        }
        .container { max-width: 1100px; margin: auto; }

        /* ===== TOPBAR ===== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        /* Theme Toggle */
        .theme-toggle {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.8rem; color: var(--text-muted); cursor: pointer;
            user-select: none;
        }
        .toggle-track {
            width: 42px; height: 22px; border-radius: 11px;
            background: var(--toggle-bg);
            position: relative; cursor: pointer;
            transition: background 0.25s;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .toggle-knob {
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--toggle-knob);
            position: absolute; top: 2px; left: 2px;
            transition: transform 0.25s, background 0.25s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        [data-theme="dark"] .toggle-knob { transform: translateX(20px); }
        [data-theme="dark"] .toggle-track { background: var(--accent); border-color: var(--accent); }

        /* Revision Button */
        .rev-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 8px; font-size: 0.82rem;
            font-weight: 600; cursor: pointer; border: 1.5px solid var(--revlist-border);
            background: var(--revlist-bg); color: #b45309;
            transition: all 0.2s; white-space: nowrap;
        }
        [data-theme="dark"] .rev-btn { color: #fbbf24; }
        .rev-btn:hover { opacity: 0.85; }
        .rev-badge {
            background: #f59e0b; color: #fff;
            border-radius: 10px; padding: 1px 7px;
            font-size: 0.72rem; font-weight: 700; min-width: 20px; text-align: center;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center; margin-bottom: 22px; padding: 26px 20px 20px;
            background: var(--surface); border-radius: 14px;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            position: relative; overflow: hidden;
        }
        .header::before {
            content: ''; position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 400px; height: 180px;
            background: radial-gradient(ellipse, rgba(108,142,245,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .header h1 {
            font-size: clamp(1.3rem, 4vw, 1.9rem); font-weight: 700; letter-spacing: -0.4px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 6px;
        }
        .header .subtitle {
            font-family: 'Hind Siliguri', sans-serif;
            color: var(--text-muted); font-size: 0.98rem;
        }
        .stats-row { display: flex; justify-content: center; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
        .stat-chip {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 14px; font-size: 0.78rem; color: var(--text-muted);
        }
        .stat-chip span { color: var(--accent); font-weight: 600; }

        /* ===== SEARCH ===== */
        .search-wrapper {
            position: relative; margin-bottom: 18px;
        }
        .search-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 1rem; pointer-events: none;
        }
        #searchInput {
            width: 100%; padding: 11px 42px 11px 40px;
            border: 1.5px solid var(--search-border); border-radius: 10px;
            background: var(--search-bg); color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 0.9rem;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,142,245,0.12); }
        #searchInput::placeholder { color: var(--text-muted); }
        #clearSearch {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: var(--text-muted);
            font-size: 1.1rem; display: none; padding: 2px 4px; border-radius: 4px;
        }
        #clearSearch:hover { color: var(--text); }
        .search-results-info {
            font-size: 0.78rem; color: var(--text-muted); margin-top: 5px; padding-left: 2px;
        }

        /* ===== NAV GRID ===== */
        .nav-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; margin-bottom: 18px;
        }
        @media (max-width: 600px) { .nav-grid { grid-template-columns: repeat(4, 1fr); } }
        .day-btn {
            padding: 9px 5px; font-size: 0.85rem; font-weight: 700;
            border: 1.5px solid var(--btn-border); border-radius: 9px; cursor: pointer;
            transition: all 0.18s; background: var(--btn-bg); color: var(--btn-color);
            font-family: 'Inter', sans-serif; line-height: 1.3; text-align: center;
        }
        .day-btn:hover { opacity: 0.75; }
        .day-btn.active {
            background: var(--btn-active-bg); color: var(--btn-active-color);
            border-color: var(--accent); box-shadow: 0 0 10px rgba(108,142,245,0.18);
        }
        .day-btn .date-label { display: block; font-size: 0.65rem; color: inherit; opacity: 0.7; font-weight: 400; margin-top: 1px; }

        /* ===== DISPLAY AREA ===== */
        #displayArea {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden; box-shadow: var(--shadow);
        }
        .empty-state { text-align: center; padding: 56px 24px; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.8rem; margin-bottom: 10px; }
        .empty-state p { font-family: 'Hind Siliguri', sans-serif; font-size: 1rem; }
        .day-header {
            padding: 16px 22px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px; background: var(--surface2);
        }
        .day-header h2 { font-size: 1rem; font-weight: 600; color: var(--text); }
        .word-count-badge {
            background: var(--badge-bg); color: var(--badge-text);
            border: 1px solid var(--badge-border); border-radius: 20px;
            padding: 3px 13px; font-size: 0.76rem; font-weight: 600;
        }
        .double-click-hint {
            font-size: 0.72rem; color: var(--text-muted);
            font-style: italic; padding: 0px 0px; display: block;
        }

        /* ===== TABLE ===== */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 11px 26px; text-align: left; font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: var(--header-th); background: var(--header-th-bg); border-bottom: 1px solid var(--border);
        }
        thead th:nth-child(1) { width: 20%; }
        thead th:nth-child(2) { width: 25%; }
        thead th:nth-child(3) { width: 55%; }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; cursor: pointer; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--hover-row); }
        tbody tr.in-revision { background: var(--selected-row) !important; }
        td { padding: 13px 26px; vertical-align: top; line-height: 1.55; }
        .word-cell { font-size: 0.93rem; font-weight: 700; color: var(--word-color); letter-spacing: 0.01em; display: flex; align-items: center; gap: 6px; }
        .word-cell .pin-icon { font-size: 0.75rem; opacity: 0.7; }
        .bn-cell { font-family: 'Hind Siliguri', sans-serif; font-size: 0.98rem; color: var(--text); font-weight: 500; }
        .m-cell { font-family: 'Hind Siliguri', sans-serif; font-size: 0.95rem; color: var(--mnemonic-color); font-style: italic; }
        .no-results { text-align: center; padding: 36px; color: var(--text-muted); font-size: 0.9rem; }

        /* ===== REVISION PAGE ===== */
        #revisionPage {
            display: none; background: var(--surface);
            border: 1px solid var(--border); border-radius: 14px;
            overflow: hidden; box-shadow: var(--shadow);
        }
        .rev-page-header {
            padding: 16px 22px; border-bottom: 1px solid var(--border);
            background: var(--surface2); display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .rev-page-header h2 { font-size: 1rem; font-weight: 600; color: var(--text); }
        .back-btn {
            padding: 7px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
            cursor: pointer; border: 1.5px solid var(--btn-border);
            background: var(--btn-bg); color: var(--btn-color);
            transition: all 0.18s; font-family: 'Inter', sans-serif;
        }
        .back-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .rev-actions {
            padding: 14px 22px; border-bottom: 1px solid var(--border);
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        .copy-btn {
            padding: 8px 18px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
            cursor: pointer; border: 1.5px solid var(--accent);
            background: var(--accent); color: #fff;
            transition: opacity 0.18s; font-family: 'Inter', sans-serif;
        }
        .copy-btn:hover { opacity: 0.85; }
        .clear-rev-btn {
            padding: 8px 18px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
            cursor: pointer; border: 1.5px solid #e53e3e;
            background: transparent; color: #e53e3e;
            transition: all 0.18s; font-family: 'Inter', sans-serif;
        }
        .clear-rev-btn:hover { background: #e53e3e; color: #fff; }
        .rev-word-box {
            padding: 22px 22px 28px;
            font-family: 'Inter', sans-serif; font-size: 0.95rem;
            color: var(--text); line-height: 1.9; word-break: break-word;
        }
        .rev-word-box .rev-word-tag {
            display: inline-block; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 6px;
            padding: 3px 10px; margin: 3px 4px; font-weight: 600;
            color: var(--word-color); font-size: 0.88rem;
            cursor: pointer; transition: all 0.15s;
        }
        .rev-word-tag:hover { background: #fee2e2; border-color: #fca5a5; color: #b91c1c; }
        [data-theme="dark"] .rev-word-tag:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #fca5a5; }
        .rev-empty { padding: 44px; text-align: center; color: var(--text-muted); }

        /* ===== REVIEW DAY ===== */
        .review-card { padding: 36px 28px; text-align: center; }
        .review-card h3 { font-size: 1.2rem; color: var(--accent2); margin-bottom: 10px; }
        .review-card p { font-family: 'Hind Siliguri', sans-serif; color: var(--text-muted); max-width: 480px; margin: 0 auto; line-height: 1.7; }

        /* toast */
        #toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
            background: #1a1a2e; color: #fff; padding: 10px 22px; border-radius: 22px;
            font-size: 0.82rem; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div class="container">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-left">
            <label class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
                <span id="themeIcon">🌙</span>
                <div class="toggle-track" onclick="toggleTheme()">
                    <div class="toggle-knob"></div>
                </div>
                <span id="themeLabel">Dark Mode</span>
            </label>
        </div>
        <button class="rev-btn" onclick="showRevisionPage()">
            📌 Revision List <span class="rev-badge" id="revBadge">0</span>
        </button>
    </div>

    <!-- HEADER -->
    <div class="header">
        <h1>📚 Barron's 333 Vocabulary Master</h1>
      <p class="subtitle">প্ল্যান্ড বাই <a href="https://facebook.com/adhovi"><b>অভি</b></a></p>
        <p class="subtitle">জুন ৯ থেকে ২২ পর্যন্ত ১৪ দিনের পূর্ণাঙ্গ রুটিন</p>
        <div class="stats-row">
            <div class="stat-chip">মোট শব্দ: <span>৩৩৩</span></div>
            <div class="stat-chip">মোট দিন: <span>১৪</span></div>
            <div class="stat-chip">প্রতিদিন: <span>~২৪ শব্দ</span></div>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="যেকোনো শব্দ বা বাংলা অর্থ দিয়ে খুঁজুন... (Search any word)" autocomplete="off">
        <button id="clearSearch" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-results-info" id="searchInfo"></div>

    <!-- NAV -->
    <div class="nav-grid" id="navGrid"></div>

    <!-- MAIN DISPLAY -->
    <div id="displayArea">
        <div class="empty-state">
            <div class="icon">👆</div>
            <p>পড়া শুরু করতে উপরের যেকোনো একটি Day বাটনে ক্লিক করুন!</p>
        </div>
    </div>

    <!-- REVISION PAGE -->
    <div id="revisionPage">
        <div class="rev-page-header">
            <h2>📌 Revision List</h2>
            <button class="back-btn" onclick="hideRevisionPage()">← Back</button>
        </div>
        <div class="rev-actions">
            <button class="copy-btn" onclick="copyRevisionList()">📋 Copy as Text</button>
            <button class="clear-rev-btn" onclick="clearRevisionList()">🗑 Clear All</button>
        </div>
        <div class="rev-word-box" id="revWordBox">
            <div class="rev-empty">কোনো শব্দ এখনো যোগ করা হয়নি।<br><small>কোনো শব্দে ডাবল-ক্লিক করলে এখানে যোগ হবে।</small></div>
        </div>
    </div>

</div>
<div id="toast"></div>

<script>
const dates = ["June 9","June 10","June 11","June 12","June 13","June 14","June 15","June 16","June 17","June 18","June 19","June 20","June 21","June 22"];
let currentDay = null;
let isSearchMode = false;
let revisionWords = new Set();

// ===== THEME =====
function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
    document.getElementById('themeLabel').textContent = isDark ? 'Dark Mode' : 'Light Mode';
}

// ===== VOCABULARY DATA =====
const vocabularyData = {
    1: [
        {w:"Abate",bn:"কমানো, প্রশমিত করা",m:"Bet করলে টাকা Abate (কমে) যায়।"},
        {w:"Aberrant",bn:"বিচ্যুতি, অস্বাভাবিক",m:"Ab + Error: স্বাভাবিক নিয়মে কোনো ভুল থাকা।"},
        {w:"Abeyance",bn:"স্থগিত অবস্থা",m:"Absence এর মতো স্থগিত থাকা।"},
        {w:"Abscond",bn:"পালিয়ে যাওয়া",m:"এক Second-এ সবকিছু নিয়ে পালিয়ে যাওয়া।"},
        {w:"Abstemious",bn:"সংযমী",m:"Abstain থেকে Abstemious, বিলাসিতা ত্যাগ করা।"},
        {w:"Admonish",bn:"সতর্ক করা",m:"টাকা (Money) নষ্ট করায় বস Admonish করলেন।"},
        {w:"Adulterate",bn:"বিশুদ্ধতা নষ্ট করা",m:"Adult হবার সাথে সাথে ছেলেরা ভেজাল হয়ে যায়।"},
        {w:"Aesthetic",bn:"নান্দনিক",m:"সুন্দর স্থির (Static) রূপ দেখে Aesthetic আনন্দ পাওয়া।"},
        {w:"Aggregate",bn:"সমষ্টিগত",m:"Gate-এর সামনে সবার সমষ্টিগত Agreement।"},
        {w:"Alacrity",bn:"তৎপরতা",m:"Electricity-এর মতো চঞ্চল ও তৎপর।"},
        {w:"Alleviate",bn:"উপশম করা",m:"All + Eat: সব ব্যথা যেন খেয়ে ফেলা।"},
        {w:"Amalgamate",bn:"মিশ্রিত করা",m:"সব গেম (Game) বা টিমকে Amalgamate করা।"},
        {w:"Ambiguous",bn:"অস্পষ্ট",m:"বুঝতে বড় Guess করতে হয় কারণ তা Ambiguous।"},
        {w:"Ambivalence",bn:"দোটানা",m:"মনে যখন দুই (Bi) ধরনের অনুভূতি থাকে।"},
        {w:"Ameliorate",bn:"উন্নত করা",m:"A million rate-এ পরিস্থিতি উন্নত করা।"},
        {w:"Anachronism",bn:"কালবিরোধ",m:"সময়ের (Chron) সাথে যা বেমানান।"},
        {w:"Analogous",bn:"সাদৃশ্যপূর্ণ",m:"Analysis করে মিল বা Analogy খুঁজে পাওয়া।"},
        {w:"Anarchy",bn:"অরাজকতা",m:"শাসন নেই যেখানে, সেখানেই Anarchy।"},

const clearBtn = document.getElementById('clearSearch');
const searchInfo = document.getElementById('searchInfo');

searchInput.addEventListener('input', function() {
    const q = this.value.trim();
    clearBtn.style.display = q ? 'block' : 'none';
    if (q.length >= 1) {
        isSearchMode = true;
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        renderSearchResults(q);
    } else {
        isSearchMode = false;
        searchInfo.textContent = '';
        if (currentDay) showDay(currentDay, true);
        else document.getElementById('displayArea').innerHTML = `<div class="empty-state"><div class="icon">👆</div><p>পড়া শুরু করতে উপরের যেকোনো একটি Day বাটনে ক্লিক করুন!</p></div>`;
    }
});

function renderSearchResults(q) {
    const ql = q.toLowerCase();
    const matches = allWords.filter(item =>
        item.w.toLowerCase().includes(ql) ||
        item.bn.toLowerCase().includes(ql) ||
        item.m.toLowerCase().includes(ql)
    );
    searchInfo.textContent = matches.length > 0 ? `${matches.length}টি শব্দ পাওয়া গেছে` : 'কোনো শব্দ পাওয়া যায়নি';
    const displayArea = document.getElementById('displayArea');
    if (matches.length === 0) {
        displayArea.innerHTML = `<div class="day-header"><h2>🔍 Search Results</h2></div><div class="no-results">কোনো শব্দ পাওয়া যায়নি।</div>`;
        return;
    }
    displayArea.innerHTML = `
        <div class="day-header">
            <h2>🔍 Search: "${q}"</h2>
            <span class="word-count-badge">${matches.length} শব্দ</span>
        </div>
        <small class="double-click-hint">💡 কোনো row-এ ডাবল-ক্লিক করলে Revision List-এ যোগ হবে</small>
        <div class="table-wrapper"><table>
            <thead><tr><th>English Word</th><th>Bengali Meaning</th><th>Mnemonic</th></tr></thead>
            <tbody>${matches.map(item => buildRow(item)).join('')}</tbody>
        </table></div>`;
    attachRowEvents();
}

function clearSearch() {
    searchInput.value = '';
    clearBtn.style.display = 'none';
    searchInfo.textContent = '';
    isSearchMode = false;
    if (currentDay) showDay(currentDay, true);
    else document.getElementById('displayArea').innerHTML = `<div class="empty-state"><div class="icon">👆</div><p>পড়া শুরু করতে উপরের যেকোনো একটি Day বাটনে ক্লিক করুন!</p></div>`;
}
function clearSearchSilent() {
    searchInput.value = '';
    clearBtn.style.display = 'none';
    searchInfo.textContent = '';
    isSearchMode = false;
}

// ===== SHOW DAY =====
function showDay(dayNum, silent) {
    currentDay = dayNum;
    if (!silent) {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-day="${dayNum}"]`).classList.add('active');
    }
    const displayArea = document.getElementById('displayArea');
    document.getElementById('revisionPage').style.display = 'none';
    displayArea.style.display = 'block';

    if (dayNum === 14) {
        displayArea.innerHTML = `
            <div class="day-header">
                <h2>📅 Day 14 — Final Review (June 22)</h2>
                <span class="word-count-badge">🎉 Revision Day</span>
            </div>
            <div class="review-card">
                <h3>🏆 অভিনন্দন!</h3>
                <p>আজ নতুন কোনো শব্দ নেই। Day 1 থেকে Day 13 পর্যন্ত সমস্ত ৩৩৩টি শব্দ আবার একবার ঝালিয়ে নাও। কঠিন শব্দগুলো Revision List-এ রেখেছ কিনা চেক করো।</p>
            </div>`;
        return;
    }
    const words = vocabularyData[dayNum];
    if (!words) return;
    displayArea.innerHTML = `
        <div class="day-header">
            <h2>📅 Day ${dayNum} — ${dates[dayNum-1]}</h2><small class="double-click-hint">💡 কোনো row-এ ডাবল-ক্লিক করলে Revision List-এ যোগ হবে</small>
            <span class="word-count-badge">${words.length} শব্দ</span>
        </div>
        <div class="table-wrapper"><table>
            <thead><tr><th>English Word</th><th>Bengali Meaning</th><th>Mnemonic (মনে রাখার কৌশল)</th></tr></thead>
            <tbody>${words.map(item => buildRow({...item, day: dayNum})).join('')}</tbody>
        </table></div>`;
    attachRowEvents();
}

function buildRow(item) {
    const inRev = revisionWords.has(item.w);
    return `<tr class="${inRev ? 'in-revision' : ''}" data-word="${item.w}">
        <td class="word-cell">${inRev ? '<span class="pin-icon">📌</span>' : ''}${item.w}</td>
        <td class="bn-cell">${item.bn}</td>
        <td class="m-cell">${item.m}</td>
    </tr>`;
}

function attachRowEvents() {
    document.querySelectorAll('#displayArea tbody tr').forEach(row => {
        row.addEventListener('dblclick', function() {
            const word = this.dataset.word;
            if (!word) return;
            if (revisionWords.has(word)) {
                revisionWords.delete(word);
                showToast(`"${word}" revision list থেকে বাদ দেওয়া হয়েছে`);
            } else {
                revisionWords.add(word);
                showToast(`"${word}" revision list-এ যোগ হয়েছে 📌`);
            }
            updateRevBadge();
            // re-render the row
            const inRev = revisionWords.has(word);
            this.className = inRev ? 'in-revision' : '';
            this.querySelector('.word-cell').innerHTML = (inRev ? '<span class="pin-icon">📌</span>' : '') + word;
        });
    });
}

// ===== REVISION PAGE =====
function updateRevBadge() {
    document.getElementById('revBadge').textContent = revisionWords.size;
}

function showRevisionPage() {
    document.getElementById('displayArea').style.display = 'none';
    const rp = document.getElementById('revisionPage');
    rp.style.display = 'block';
    renderRevisionWords();
}

function hideRevisionPage() {
    document.getElementById('revisionPage').style.display = 'none';
    document.getElementById('displayArea').style.display = 'block';
}

function renderRevisionWords() {
    const box = document.getElementById('revWordBox');
    if (revisionWords.size === 0) {
        box.innerHTML = `<div class="rev-empty">কোনো শব্দ এখনো যোগ করা হয়নি।<br><small>কোনো শব্দে ডাবল-ক্লিক করলে এখানে যোগ হবে।</small></div>`;
        return;
    }
    const tags = [...revisionWords].map(w =>
        `<span class="rev-word-tag" title="ক্লিক করে বাদ দিন" onclick="removeFromRevision('${w}')">${w} ✕</span>`
    ).join('');
    box.innerHTML = tags;
}

function removeFromRevision(word) {
    revisionWords.delete(word);
    updateRevBadge();
    renderRevisionWords();
    // update rows in current view
    document.querySelectorAll(`#displayArea tr[data-word="${word}"]`).forEach(row => {
        row.className = '';
        row.querySelector('.word-cell').innerHTML = word;
    });
    showToast(`"${word}" বাদ দেওয়া হয়েছে`);
}

function copyRevisionList() {
    if (revisionWords.size === 0) { showToast('তালিকা খালি!'); return; }
    const text = [...revisionWords].join(', ');
    navigator.clipboard.writeText(text).then(() => showToast('Copied! ✅')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta); showToast('Copied! ✅');
    });
}

function clearRevisionList() {
    if (revisionWords.size === 0) return;
    revisionWords.clear();
    updateRevBadge();
    renderRevisionWords();
    // refresh current day view if visible
    if (currentDay && document.getElementById('displayArea').style.display !== 'none') showDay(currentDay, true);
    showToast('Revision list পরিষ্কার করা হয়েছে');
}

// ===== TOAST =====
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
